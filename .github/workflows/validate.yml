name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Rebuild install artifact
        run: npm run build

      - name: Verify built artifact is committed
        run: git diff --exit-code -- dist/lovelace-m3-lighting-dashboard.js

      - name: Run syntax checks
        run: npm run check

      - name: Run validation tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: ./coverage/lcov.info
          fail_ci_if_error: true
          verbose: true
